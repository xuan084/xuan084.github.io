<!-- Project page enhancement script: TOC + scroll fade-in + sticky CTA toggle -->
<script>
(function() {
  // ---- Build TOC from .section-title elements ----
  var titles = document.querySelectorAll('.project-section .section-title');
  if (titles.length >= 2) {
    var toc = document.createElement('nav');
    toc.className = 'pp-toc';
    var inner = document.createElement('div');
    inner.className = 'pp-toc-inner';
    titles.forEach(function(h, i) {
      var text = h.textContent.trim();
      var slug = text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
      var anchor = document.createElement('span');
      anchor.id = slug;
      anchor.className = 'pp-anchor';
      h.parentNode.insertBefore(anchor, h);
      var a = document.createElement('a');
      a.href = '#' + slug;
      a.textContent = text;
      a.dataset.target = slug;
      inner.appendChild(a);
    });
    toc.appendChild(inner);
    var teaser = document.querySelector('.teaser-section') || document.querySelector('.project-header');
    if (teaser && teaser.parentNode) {
      teaser.parentNode.insertBefore(toc, teaser.nextSibling);
    }

    // active highlight on scroll
    var links = toc.querySelectorAll('a');
    var anchors = Array.from(document.querySelectorAll('.pp-anchor'));
    function updateActive() {
      var y = window.scrollY + 120;
      var current = null;
      for (var i = 0; i < anchors.length; i++) {
        var rect = anchors[i].getBoundingClientRect();
        var top = rect.top + window.scrollY;
        if (top <= y) current = anchors[i].id;
      }
      links.forEach(function(l) {
        l.classList.toggle('is-active', l.dataset.target === current);
      });
    }
    window.addEventListener('scroll', updateActive, {passive: true});
    updateActive();
  }

  // ---- Sticky CTA bar (built from existing .links-bar) ----
  var heroLinks = document.querySelector('.project-header .links-bar');
  if (heroLinks) {
    var sticky = document.createElement('div');
    sticky.className = 'pp-cta-sticky';
    heroLinks.querySelectorAll('a').forEach(function(a) {
      var clone = a.cloneNode(true);
      sticky.appendChild(clone);
    });
    document.body.appendChild(sticky);

    function toggleSticky() {
      var heroRect = heroLinks.getBoundingClientRect();
      sticky.classList.toggle('is-visible', heroRect.bottom < 0);
    }
    window.addEventListener('scroll', toggleSticky, {passive: true});
    toggleSticky();
  }

  // ---- Scroll fade-in via IntersectionObserver ----
  if ('IntersectionObserver' in window) {
    var io = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('is-visible');
          io.unobserve(entry.target);
        }
      });
    }, {threshold: 0.12, rootMargin: '0px 0px -10% 0px'});
    document.querySelectorAll('.pp-fadeup, .pp-fadeup-stagger').forEach(function(el) {
      io.observe(el);
    });
  } else {
    document.querySelectorAll('.pp-fadeup, .pp-fadeup-stagger').forEach(function(el) {
      el.classList.add('is-visible');
    });
  }
})();
</script>
